name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap
        run: |
          # 1. Create dummy files to skip interactive steps (SSH/Colima)
          mkdir -p ~/.ssh ~/.colima/default
          touch ~/.ssh/id_ed25519 ~/.colima/default/colima.yaml Brewfile

          # 2. Run the script
          ./bootstrap.sh

      - name: Verify
        shell: zsh {0}
        run: |
          source ~/.zshrc
          
          # Check if ~/bin and ~/.zsh are valid symbolic links
          if [ -L ~/bin ] && [ -L ~/.zsh ]; then
            echo "✔ Dotfiles linked successfully"
          else
            echo "❌ Linking failed"
            exit 1
          fi